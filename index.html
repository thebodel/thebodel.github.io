<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Алара,привіт!</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <main class="scene scene--terminal" id="terminalScene" aria-label="Терминал">
        <section class="terminal" aria-label="Терминал">
            <section class="terminal-output" id="terminalOutput"></section>
        </section>
    </main>
    <main class="scene scene--cake is-hidden" id="cakeScene" aria-label="Торт со свечами">
        <div class="heart-burst" id="heartBurst" aria-hidden="true"></div>
        <section class="cake-layout">
            <section class="cake-stage">
                <video
                    id="burningCake"
                    class="cake-video is-visible"
                    src="img/Comp 1_1.mp4"
                    autoplay
                    loop
                    muted
                    playsinline
                    preload="auto"
                ></video>
                <video
                    id="extinguishCake"
                    class="cake-video"
                    src="img/Comp 1.mp4"
                    muted
                    playsinline
                    preload="auto"
                ></video>
            </section>
            <aside class="cake-title" aria-label="Поздравление">
                <p class="cake-title__line">С днем</p>
                <p class="cake-title__line">Рож</p>
                <p class="cake-title__line">Де</p>
                <p class="cake-title__line">Ни</p>
                <p class="cake-title__line">Я!!!</p>
            </aside>
        </section>
    </main>
    <audio id="introSound" src="audio/Floating Trees_spotdown.org.mp3" preload="auto"></audio>
    <audio id="cakeSound" src="audio/SpotiDownloader.com - Cat - C418.mp3" preload="auto"></audio>
    <audio id="imageSound" src="audio/open.mp3" preload="auto"></audio>
    <script src="index.js"></script>
</body>
</html>
